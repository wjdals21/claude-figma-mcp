<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>집반찬</title>
    <style>
      /* ========== Reset ========== */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box; /* border, padding이 커져도 전체 크기는 유지 */
      }

      ul,
      ol,
      li {
        list-style: none; /* ul,ol, li의 브릿과 점 제거 */
      }

      body {
        font-family: "맑은 고딕"; /* 전체 폰트 설정 */
        color: #000; /* 페이지 내의 모든 글자 색상, 하위 요소에도 상속 */
      }

      a {
        text-decoration: none; /* 링크 밑줄 제거 */
        color: inherit; /* 기본 브라우저 스타일을 상속하지 않고 자신의 부모 요소의 색상을 따르도록 설정(조화) */
      }

      /* ========== Layout 공통 컨테이너 ========== */
      .container {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        display: flex; /* 플렉스 컨테이너로 설정, 자식 요소들을 가로로 배치, 기본은 row 방향 */
        flex-wrap: wrap; /* 자식 요소들이 컨테이너 너비를 초과하면 다음 줄로 넘어가도록 허용 */
        align-items: center; /* 자식 요소들을 교차축(수직)으로 중앙 정렬 */
        justify-content: space-between; /* 주축(가로) 방향으로 자식 요소들을 양 끝으로 배치 */
      }

      /* ========== Header ========== */
      header {
        height: 150px; /* 데모용 고정 높이 */
        background-color: gold;
      }

      /* ========== Slider ========== */
      #slider {
        width: 100%; /* 부모 요소의 너비에 맞게 확장 즉, 부모 넓이에 꽉 차도록 */
        min-height: 450px; /* 배너 이미지의 최소 높이, 이미지가 작아도 이 높이는 유지 */
        background-color: tomato;
      }

      /* ========== Main ========== */
      main {
        min-height: 600px; /* 최소 높이, 콘텐츠가 늘어나면 자동으로 확장 */
        background-color: skyblue;
      }

      /* ========== Footer ========== */
      footer {
        min-height: 200px;
        background-color: greenyellow;
      }
    </style>
  </head>
  <body>
    <header class="container"></header>
    <section id="slider"></section>
    <main class="container"></main>
    <footer class="container"></footer>
  </body>
</html>
