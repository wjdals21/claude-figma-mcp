<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>집반찬</title>
    <style>
      /* ========== Reset ========== */
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      ul,
      ol,
      li {
        list-style: none;
      }

      body {
        font-family: "맑은 고딕";
        color: #000;
      }

      a {
        text-decoration: none;
      }
      /* ========== Layout 공통 컨테이너 ========== */
      .container {
        max-width: 1200px;
        width: 100%;
        margin: 0 auto;
        display: flex; /* 플렉스 컨테이너로 설정, 자식 요소들을 가로로 배치, 기본은 row 방향 */
        flex-wrap: wrap; /* 자식 요소들이 컨테이너 너비를 초과하면 다음 줄로 넘어가도록 허용 */
        align-items: center; /* 자식 요소들을 교차축(수직)으로 중앙 정렬 */
        justify-content: space-between; /* 양 끝 요소를 컨테이너의 시작과 끝에 밀착시킨 후, 나머지 요소들을 그 사이에 균등한 간격으로 배치 */
      }

      /* ========== Header ========== */
      header {
        height: 150px;
        /* 데모용 고정 높이 */
        background-color: gold;
        align-items: center;
      }

      /* header 내부 요소 배치 */
      .search-box {
        width: 350px;
        height: 60px;
        background: red;
        border-radius: 8px;
      }

      .right-box {
        width: 350px;
        height: 90px;
        display: flex;
        flex-direction: column;
        border: 3px solid blue;
      }

      .logo {
        width: 350px;
        height: 70px;
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        background: blue;
      }

      .login {
        width: 100%;
        height: 30px;
        font-size: 14px;
        background: purple;
      }

      .menu {
        width: 100%;
        height: 40px;
        margin: 35px 0 0 0px;
        background: #000;
      }

      /* ========== Slider ========== */
      #slider {
        width: 100%; /* 부모 요소의 너비에 맞게 확장 즉, 부모 넓이에 꽉 차도록 */
        min-height: 450px; /* 배너 이미지의 최소 높이, 이미지가 작아도 이 높이는 유지 */
        background-color: tomato;
      }

      /* ========== Main ========== */
      main {
        min-height: 600px;
        /* 나중에 콘텐츠 늘어남 */
        background-color: skyblue;
      }

      /* ========== Banchan Section ========== */
      /* .section-grid는 각 섹션 내에서 카드들을 가로로 정렬하고 줄바꿈을 허용하는 플렉스 그리드입니다. */
      .section-grid {
        display: flex; /* 플렉스 컨테이너로 설정, 자식 요소들을 가로로 배치, 기본은 row 방향 */
        flex-wrap: wrap; /* 자식 요소들이 컨테이너 너비를 초과하면 다음 줄로 넘어가도록 허용 */
        justify-content: center; /* 주축(가로) 방향으로 자식 요소들을 중앙 정렬 */
        align-content: center; /* 교차축(세로) 방향으로 자식 요소들을 중앙 정렬, 여러 줄이 있을 때 전체 줄을 컨테이너의 중앙에 배치 */
        gap: 15px; /* 자식 요소들 사이의 간격을 15px로 설정 */
        margin: 30px 0px; /* 상하 30px, 좌우 0px의 마진 설정 */
      }

      /* ========== Banchan Product Card ========== */
      .banchan {
        width: 100%; /* 부모 요소인 .section-grid의 너비에 맞게 확장 */
        height: 1000px; /* 높이는 고정, 콘텐츠가 늘어나도 이 높이는 유지 */
        border: 2px solid red;
      }

      /* ========== Banchan Product Card의 제목 ========== */
      div > h3 {
        width: 100%;
        font-size: 27px;
        text-align: center;
        line-height: 30px;
      }

      /* ========== Banchan Product Card의 내부 설명 ========== */
      div > p {
        width: 100%;
        font-size: 17px;
        text-align: center;
        color: #666;
        margin-bottom: 25px;
      }

      /* ========== Banchan Product Card의 개별 카드 스타일 ========== */
      .product-card {
        width: 280px;
        height: 395px;
        background-color: #fff;
      }

      /* ========== MD 추천반찬 카드 스타일 ========== */
      .md-card {
        width: 280px;
        height: 515px;
        background-color: #fff;
      }

      /* ========== Kid Banchan, New Banchan, Banner, MD Banchan 섹션 스타일 ========== */
      .kid-banchan {
        width: 100%;
        height: 600px;
        border: 2px solid blue;
      }

      .new-banchan {
        width: 100%;
        height: 1000px;
        border: 2px solid orange;
      }

      .banner {
        width: 100%;
        height: 200px;
        border: 2px solid green;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
      }

      .banner > a > img {
        width: 380px;
        height: 130px;
      }

      /* ========== MD 추천반찬 섹션 스타일 ========== */
      .md-banchan {
        width: 100%;
        height: 750px;
        border: 2px solid #000;
      }
      /* ========== MD 추천반찬 섹션의 탭 스타일 ========== */
      .md-banchan > ul {
        width: 100%;
        min-height: 45px;
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 0 0 30px 0;
      }

      .md-banchan > ul > li {
        background-color: #ddd;
        padding: 10px 20px 0px;
        border-radius: 30px;
        font-size: 16px;
        display: block;
      }

      .md-banchan > ul > li > a {
        color: #333;
      }

      /* md-banchan > ul > li:first-child은 첫 번째 탭을 선택된 상태로 표시하기 위한 스타일 */
      .md-banchan > ul > li:first-child {
        background-color: #0d5611;
        color: #fff;
      }

      /* ========== Footer ========== */
      footer {
        height: 200px;
        background-color: greenyellow;
      }

      /* ======================================================
       설명: 아래는 HTML 구조와 각 섹션에 대한 간단한 안내 주석입니다.
       (이전 주석을 참고하여 이어서 작성됨)

       - header.container: 상단 헤더 영역. 내부에 .search-box, .logo, .right-box(로그인, 메뉴) 포함.
       - #slider: 페이지 상단의 배너/슬라이더 영역.
       - main.container: 본문 콘텐츠를 담는 메인 컨테이너.
           내부 섹션들:
             * .banchan (알뜰반찬 섹션) - .section-grid로 카드 정렬
             * .kid_banchan (어린이 반찬 섹션)
             * .new-banchan (신상품 섹션)
             * .banner (배너 이미지 목록)
             * .md-banchan (MD 추천 섹션) - 탭(ul>li)으로 카테고리 필터링
       - .section-grid: 카드들을 가로로 정렬하고 줄바꿈을 허용하는 플렉스 그리드
       - .product-card, .md-card: 각각 상품 카드의 기본 크기/배경을 설정
       - footer.container: 페이지 하단 정보 영역

       사용 팁:
       - .section-grid의 `gap`과 `flex-wrap`을 조절하면 반응형 카드 배치 실습에 용이
    ====================================================== */
    </style>
  </head>

  <body>
    <header class="container">
      <div class="search-box"></div>
      <div class="logo"></div>
      <div class="right-box">
        <div class="login"></div>
        <nav class="menu"></nav>
      </div>
    </header>

    <section id="slider">빈 슬라이드</section>

    <main class="container">
      <div class="banchan section-grid">
        <h3>부담없는 알뜰 반찬</h3>
        <p>착한 가격으로 챙기는 든든 한 끼</p>
        <div class="product-card">1</div>
        <div class="product-card">2</div>
        <div class="product-card">3</div>
        <div class="product-card">4</div>
        <div class="product-card">5</div>
        <div class="product-card">6</div>
        <div class="product-card">7</div>
        <div class="product-card">8</div>
      </div>

      <div class="kid_banchan section-grid">
        <h3>어린이 반찬</h3>
        <p>착한 가격으로 챙기는 든든 한 끼</p>
        <div class="product-card">1</div>
        <div class="product-card">2</div>
        <div class="product-card">3</div>
        <div class="product-card">4</div>
      </div>

      <div class="new-banchan section-grid">
        <h3>새로 나온 반찬</h3>
        <p>착한 가격으로 챙기는 든든 한 끼</p>
        <div class="product-card">1</div>
        <div class="product-card">2</div>
        <div class="product-card">3</div>
        <div class="product-card">4</div>
        <div class="product-card">5</div>
        <div class="product-card">6</div>
        <div class="product-card">7</div>
        <div class="product-card">8</div>
      </div>

      <div class="banner">
        <a href="#"><img src="img/banner/banner1.png" alt="" /></a>
        <a href="#"><img src="img/banner/banner2.png" alt="" /></a>
        <a href="#"><img src="img/banner/banner3.png" alt="" /></a>
      </div>

      <div class="md-banchan section-grid">
        <h3>MD 추천반찬</h3>
        <p>이번 주 가장 추천하는 제품만 골라드려요</p>
        <ul>
          <li>비빔밥</li>
          <li><a href="#">국/찌개/탕</a></li>
          <li><a href="#">어린이 반찬</a></li>
          <li><a href="#"> 볶음</a></li>
          <li><a href="#"> 무침</a></li>
          <li><a href="#"> 메인요리</a></li>
          <li><a href="#"> 조림</a></li>
        </ul>
        <div class="md-card">1</div>
        <div class="md-card">2</div>
        <div class="md-card">3</div>
        <div class="md-card">4</div>
      </div>
    </main>

    <footer class="container"></footer>
  </body>
</html>
